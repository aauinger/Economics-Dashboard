<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scope · FH OÖ Campus Steyr</title>

<style>
  :root{
    --aubergine:#823896; --aubergine-d:#6a2d7b;
    --ink:#192121; --gray-2:#bababa; --gray-1:#eaebed; --white:#fff;
    --petrol:#007478; --cobalt:#004b96; --moos:#5e8036;
    --up:#1f8b4c; --down:#cc3340; --up-l:#5fd49a; --down-l:#ff7b86;
    --font:"Aeonik",-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0c0b0e;font-family:var(--font);color:var(--ink);
    overflow:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

  #stage{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:min(100vw,calc(100vh*16/9));height:min(100vh,calc(100vw*9/16));
    background:var(--white);container-type:size;overflow:hidden}

  #progress{position:absolute;top:7.6cqh;left:0;height:0.6cqh;width:0%;
    background:var(--aubergine);z-index:40;transition:width .25s linear}

  .screen{position:absolute;inset:0;display:none;flex-direction:column;
    padding:10.6cqh 6cqw 4.4cqh;opacity:0;transition:opacity .45s ease}
  .screen.active{display:flex;opacity:1}

  header.bar{display:flex;align-items:center;justify-content:space-between;
    border-bottom:0.25cqh solid var(--gray-1);padding-bottom:1.9cqh;flex:0 0 auto}
  .brand{display:flex;align-items:baseline;gap:1.4cqw}
  .brand .mark{font-weight:700;font-size:4.8cqh;letter-spacing:-.02em}
  .brand .mark b{color:var(--aubergine)}
  .brand .sep{font-size:4cqh;color:var(--gray-2);font-weight:300}
  .brand .sect{font-size:4.5cqh;font-weight:700;letter-spacing:-.01em;text-transform:uppercase}
  .fhlogo{height:8.2cqh;width:auto;display:block}
  .headright{display:flex;align-items:center;gap:2.4cqw}
  .clock{text-align:right}
  .clock .time{font-size:3.2cqh;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:.01em}
  .clock .date{font-size:2cqh;opacity:.55}
  /* Sprach-Chip */
  .lang{display:flex;align-items:center;gap:.4cqw;border:.22cqh solid var(--gray-2);
    border-radius:5cqh;padding:.5cqh .4cqw;cursor:pointer;user-select:none}
  .lang b{font-size:2.3cqh;font-weight:700;letter-spacing:.03em;padding:.4cqh 1.1cqw;
    border-radius:4cqh;color:var(--gray-2)}
  .lang b.on{background:var(--aubergine);color:#fff}

  .body{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;padding-top:2.2cqh}
  .eyebrow{font-size:3.1cqh;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:var(--aubergine);margin-bottom:1.6cqh;flex:0 0 auto}

  .metrics{display:grid;gap:2cqh 4cqw;flex:0 0 auto}
  .metrics.cols-4{grid-template-columns:repeat(4,1fr)}
  .metrics.cols-3{grid-template-columns:repeat(3,1fr)}
  .metric .label{font-size:2.9cqh;font-weight:500;opacity:.7;margin-bottom:.3cqh}
  .metric .value{font-size:10cqh;font-weight:700;letter-spacing:-.03em;line-height:.92;font-variant-numeric:tabular-nums}
  .metric .sub{font-size:2.9cqh;font-weight:700;margin-top:.4cqh}
  .metric .src{font-size:2.2cqh;opacity:.5;margin-top:.2cqh}
  .up{color:var(--up)} .down{color:var(--down)}

  .rows{display:flex;flex-direction:column;gap:1.4cqh;margin-top:1cqh}
  .row{display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:.18cqh solid var(--gray-1);padding-bottom:1.2cqh}
  .row .rl{font-size:3.4cqh;font-weight:600}
  .row .rv{font-size:4.6cqh;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  .row .rs{font-size:2.4cqh;opacity:.55;font-weight:500;margin-left:1.2cqw}

  .chart-wrap{flex:1;min-height:0;display:flex;flex-direction:column;margin-top:2cqh}
  .legend{display:flex;flex-wrap:wrap;gap:1cqh 3cqw;margin-bottom:1cqh;flex:0 0 auto}
  .leg{display:flex;align-items:center;gap:1cqw;font-size:2.6cqh;font-weight:600}
  .leg i{width:2.6cqw;height:1cqh;border-radius:1cqh;display:inline-block}
  .chart{flex:1;min-height:0}
  .chart svg{width:100%;height:100%;display:block}
  .note{margin-top:1.3cqh;font-size:2.4cqh;line-height:1.32;opacity:.8;max-width:88cqw;flex:0 0 auto}
  .srcline{margin-top:2.4cqh;font-size:2.05cqh;line-height:1.45;flex:0 0 auto}
  .srcline b{opacity:.5;font-weight:500}
  .srcline a{color:var(--aubergine);text-decoration:none;font-weight:600}
  .srcline a:hover{text-decoration:underline}

  .ccard{display:flex;flex-direction:column}
  .ccard .spark{height:12cqh;margin-top:1cqh}
  .ccard .spark svg{width:100%;height:100%;display:block}

  .news-single{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;gap:2.1cqh}
  .news-meta{display:flex;align-items:center;gap:2.5cqw}
  .news-time{font-size:2.7cqh;font-weight:700;color:var(--aubergine)}
  .news-count{font-size:2.3cqh;font-weight:600;opacity:.55}
  .ndots{display:flex;gap:1cqw;margin-left:auto}
  .ndot{width:1.7cqh;height:1.7cqh;border-radius:50%;background:var(--gray-2)}
  .ndot.on{background:var(--aubergine)}
  .news-title{font-size:5.9cqh;font-weight:700;line-height:1.05;letter-spacing:-.01em}
  .news-text{font-size:3.2cqh;font-weight:400;line-height:1.4;opacity:.85;
    display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}

  .split{display:grid;grid-template-columns:1fr 1.6fr;gap:5cqw;flex:1;min-height:0}
  .fhead{display:flex;flex-direction:column;justify-content:center}
  .fhead .big{font-size:11.5cqh;font-weight:700;letter-spacing:-.03em;line-height:.9}
  .fhead .big b{color:var(--aubergine)}
  .fhead .cap{font-size:2.5cqh;font-weight:600;margin-top:1.1cqh;opacity:.75}
  .fhead .at{font-size:2.7cqh;font-weight:700;margin-top:1.3cqh;color:var(--aubergine)}
  .fhead .cap2{font-size:2cqh;margin-top:.7cqh;opacity:.5}

  .cal{display:flex;flex-direction:column;gap:1.5cqh;margin-top:.5cqh}
  .cev{display:flex;align-items:center;gap:3cqw;border-bottom:.18cqh solid var(--gray-1);padding-bottom:1.5cqh}
  .cev .cdate{font-size:3cqh;font-weight:700;color:var(--aubergine);min-width:22cqw;font-variant-numeric:tabular-nums}
  .cev .ctag{font-size:2.3cqh;font-weight:700;letter-spacing:.04em;background:var(--gray-1);
    padding:.7cqh 1.6cqw;border-radius:4cqh;min-width:11cqw;text-align:center}
  .cev .ctxt{font-size:3.3cqh;font-weight:600}

  .board{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;gap:3.4cqh}
  .brow{overflow:hidden;position:relative}
  .brow::before,.brow::after{content:"";position:absolute;top:0;bottom:0;width:6cqw;z-index:2;pointer-events:none}
  .brow::before{left:0;background:linear-gradient(90deg,var(--white),transparent)}
  .brow::after{right:0;background:linear-gradient(270deg,var(--white),transparent)}
  .brow .blabel{position:absolute;left:0;top:50%;transform:translateY(-50%);z-index:3;
    background:var(--aubergine);color:#fff;font-size:2.4cqh;font-weight:700;letter-spacing:.05em;
    padding:1cqh 1.8cqw;text-transform:uppercase}
  .btrack{display:inline-flex;white-space:nowrap;will-change:transform;animation:crawlL 46s linear infinite}
  .btrack.rev{animation:crawlR 52s linear infinite}
  .tile{display:inline-flex;flex-direction:column;justify-content:center;
    padding:1.4cqh 3.2cqw;border-right:.18cqh solid var(--gray-1)}
  .tile .nm{font-size:2.5cqh;font-weight:600;opacity:.65;letter-spacing:.01em}
  .tile .pv{font-size:6.6cqh;font-weight:700;line-height:.96;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .tile .ch{font-size:3.2cqh;font-weight:700;font-variant-numeric:tabular-nums}

  .cover{justify-content:center;padding-bottom:5cqh}
  .cover .big{font-size:19cqh;font-weight:700;letter-spacing:-.04em;line-height:1;margin-bottom:4cqh}
  .cover .big b{color:var(--aubergine)}
  .standsfor{font-size:2.9cqh;font-weight:600;letter-spacing:.01em}
  .standsfor b{color:var(--aubergine)}
  .fak{font-size:4.6cqh;font-weight:700;margin-top:2.8cqh;letter-spacing:-.01em;line-height:1.04}
  .cover .mods{display:flex;flex-wrap:wrap;gap:1.2cqw 1.6cqw;margin-top:3.2cqh}
  .cover .chip{font-size:2.2cqh;font-weight:600;padding:1cqh 2cqw;
    border:.2cqh solid var(--aubergine);color:var(--aubergine);border-radius:6cqh;letter-spacing:.03em}

  footer.status{display:flex;align-items:center;justify-content:space-between;
    border-top:.25cqh solid var(--gray-1);padding-top:1.7cqh;font-size:2.3cqh;flex:0 0 auto}
  .status .left{opacity:.55}
  .status .stale{color:var(--down);opacity:.9;font-weight:600}
  .dots{display:flex;gap:1cqw}
  .dot{width:2.4cqh;height:2.4cqh;border-radius:50%;background:var(--gray-2);
    cursor:pointer;border:none;padding:0;transition:transform .15s,background .15s}
  .dot:hover{transform:scale(1.25)} .dot.on{background:var(--aubergine)}

  #ticker{position:absolute;left:0;right:0;top:0;height:7.6cqh;background:var(--ink);
    color:#fff;overflow:hidden;display:flex;align-items:center;z-index:35;
    border-bottom:.25cqh solid rgba(255,255,255,.08)}
  #ticker .ttrack{display:flex;flex:0 0 auto;white-space:nowrap;will-change:transform}
  .tk{display:inline-flex;align-items:baseline;gap:.9cqw;padding:0 2.3cqw;font-size:3cqh;font-variant-numeric:tabular-nums}
  .tk .sym{font-weight:700;letter-spacing:.01em}
  .tk .v{font-weight:600;opacity:.92}
  .tk .c{font-weight:700}
  .tk .c.up{color:var(--up-l)} .tk .c.down{color:var(--down-l)}
  .tk .sepdot{opacity:.3;padding-left:1.4cqw}

  @keyframes crawlL{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @keyframes crawlR{from{transform:translateX(-50%)}to{transform:translateX(0)}}

  #hint{position:absolute;bottom:10cqh;left:50%;transform:translateX(-50%);
    font-size:1.6cqh;color:#fff;opacity:0;background:rgba(0,0,0,.55);
    padding:.6cqh 1.4cqw;border-radius:4cqh;z-index:45;transition:opacity .3s;pointer-events:none}
  #hint.show{opacity:1}
  @media (prefers-reduced-motion:reduce){
    .screen,#progress{transition:none}
  }
</style>

<div id="stage">
  <div id="progress"></div>
  <div id="screens"></div>
  <div id="ticker"><div class="ttrack" id="ttrack"></div></div>
  <div id="hint"></div>
</div>

const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const deNum=(v,d=0)=>v.toLocaleString(loc(),{minimumFractionDigits:d,maximumFractionDigits:d});
function ago(ts){const s=Math.floor((now()-ts)/1000);
  if(LANG==="en"){if(s<60)return s+"s ago";const m=Math.floor(s/60);if(m<60)return m+" min ago";return Math.floor(m/60)+" h ago";}
  if(s<60)return"vor "+s+" s";const m=Math.floor(s/60);if(m<60)return"vor "+m+" min";return"vor "+Math.floor(m/60)+" h";}
function relTime(d){const s=Math.floor((now()-d.getTime())/1000);
  if(LANG==="en"){if(s<60)return"just now";const m=Math.floor(s/60);if(m<60)return m+" min ago";const h=Math.floor(m/60);if(h<24)return h+" h ago";return Math.floor(h/24)+"d ago";}
  if(s<60)return"gerade eben";const m=Math.floor(s/60);if(m<60)return"vor "+m+" min";const h=Math.floor(m/60);
  if(h<24)return"vor "+h+" Std";return"vor "+Math.floor(h/24)+" Tg";}

async function refreshNews(lang){const s=store.news[lang];try{
  const c=new AbortController();const tm=setTimeout(()=>c.abort(),5000);
  const r=await fetch(NEWS_FEED[lang],{signal:c.signal});clearTimeout(tm);if(!r.ok)throw 0;
  const xml=await r.text();const doc=new DOMParser().parseFromString(xml,"text/xml");
  const items=[...doc.querySelectorAll("item")].map(it=>{
    const get=q=>((it.querySelector(q)||{}).textContent||"");
    let desc=get("description").replace(/<[^>]*>/g," ").replace(/\s+/g," ").trim();
    if(desc.length>340)desc=desc.slice(0,338).replace(/\s+\S*$/,"")+"…";
    return {t:get("title").trim(),desc:desc,d:new Date(get("pubDate")||Date.now())};
  }).filter(x=>x.t);
  if(!items.length)throw 0;
  items.sort((a,b)=>b.d-a.d);
  s.data=items.slice(0,5).map(x=>({t:x.t,desc:x.desc,time:relTime(x.d)}));
  s.ts=now();s.stale=false;s.src=(lang==="en"?"Markets RSS (live)":"WirtschaftsWoche · RSS (live)");

/* ----- Risk-Tracker: echte EPU/WUI/GPR/TPU-Werte aus normalisierter risk.json -----
   Die Datei wird serverseitig vom Updater (update_risk.py) erzeugt und liegt am
   gleichen Origin → kein CORS. Bei Nichterreichbarkeit bleiben die Fallback-Werte. */
const RISK_SOURCE="./data/risk.json";
function pickHistory(h){const vals=h.map(x=>+x.v).filter(v=>isFinite(v));
  const last=vals[vals.length-1];const avg=vals.reduce((a,b)=>a+b,0)/(vals.length||1);
  return {v:last,avg:avg,spark:vals.slice(-12),asof:(h[h.length-1]||{}).t||""};}
async function refreshRisk(){const s=store.risk;
  try{const c=new AbortController();const tm=setTimeout(()=>c.abort(),6000);
    const r=await fetch(RISK_SOURCE,{signal:c.signal,cache:"no-store"});clearTimeout(tm);if(!r.ok)throw 0;
    const j=await r.json();const order=["EPU","WUI","GPR","TPU"];const out=[];let asof="";
    order.forEach(k=>{const sd=j.series&&j.series[k];if(!sd||!sd.history||!sd.history.length)return;
      const p=pickHistory(sd.history);const avg=(typeof sd.avg==="number")?sd.avg:p.avg;
      const nm=sd.name?{de:sd.name,en:sd.name}:{de:k,en:k};
      out.push({k:k,n:nm,v:+(+p.v).toFixed(2),avg:+(+avg).toFixed(2),spark:p.spark,asof:sd.asof||p.asof});
      const a=sd.asof||p.asof;if(a>asof)asof=a;});
    if(!out.length)throw 0;
    s.data=out;s.asof=asof;s.ts=now();s.stale=false;
    s.src=(j.meta&&j.meta.source)?j.meta.source:"FRED · Caldara–Iacoviello (live)";
  }catch(e){s.stale=true;
    s.src=LANG==="en"?"FRED · Caldara–Iacoviello · fallback":"FRED · Caldara–Iacoviello · Fallback";}
}

  ()=>store.krypto.data.map(c=>({sym:c.sym,v:"$"+deNum(c.val,c.val<10?2:0),chg:c.chg})),
];
function tickerItems(){return tickerDefs.flatMap(f=>f());}
function tickerItemHTML(it,i){
  return `<span class="tk" data-i="${i}"><span class="sym">${esc(it.sym)}</span>`
    +`<span class="v">${esc(it.v)}</span>`
    +`<span class="c ${cls(it.chg)}">${arrow(it.chg)} ${chg(it.chg)}</span>`
    +`<span class="sepdot">·</span></span>`;
}
let tCopies=2,tPerSet=0,tWrap=0,tX=0,tLast=0,tRAF=null;
const TICKER_SPEED=90; // px/s
function buildTicker(){
  const track=document.getElementById("ttrack");if(!track)return;
  const items=tickerItems();tPerSet=items.length;
  const setHTML=items.map(tickerItemHTML).join("");
  track.style.animation="none"; // wir animieren per JavaScript, nicht per CSS
  track.innerHTML=setHTML+setHTML;tCopies=2;
  const stage=document.getElementById("stage");
  const stageW=(stage&&stage.clientWidth)?stage.clientWidth:1280;
  let guard=0;
  while(track.scrollWidth<stageW*2.2 && guard++<8){tCopies+=2;track.innerHTML=setHTML.repeat(tCopies);}
  tWrap=track.scrollWidth/tCopies; // Breite genau eines Datensatzes
  if(tX>0||tX<=-tWrap)tX=0;
  track.style.transform="translateX("+tX+"px)";
  startTickerRAF();
}
function startTickerRAF(){
  if(tRAF)return;
  tLast=performance.now();
  const step=now=>{
    const track=document.getElementById("ttrack");
    if(!track){tRAF=null;return;}
    const dt=Math.min(0.05,(now-tLast)/1000);tLast=now;
    tX-=TICKER_SPEED*dt;
    if(tWrap>0&&tX<=-tWrap)tX+=tWrap; // nahtloser Übergang
    track.style.transform="translateX("+tX.toFixed(2)+"px)";
    tRAF=requestAnimationFrame(step);
  };
  tRAF=requestAnimationFrame(step);
}
function updateTicker(){
  const track=document.getElementById("ttrack");if(!track)return;
  const items=tickerItems();
  if(!track.children.length||tPerSet!==items.length||track.children.length!==tPerSet*tCopies){buildTicker();return;}
  // nur Werte aktualisieren (in allen Kopien) – Lauf läuft ununterbrochen weiter
  items.forEach((it,i)=>{
    for(let cI=0;cI<tCopies;cI++){const el=track.children[i+cI*tPerSet];if(!el)continue;
      el.querySelector(".sym").textContent=it.sym;
      el.querySelector(".v").textContent=it.v;
      const c=el.querySelector(".c");c.textContent=arrow(it.chg)+" "+chg(it.chg);c.className="c "+cls(it.chg);}
  });
}
/* Märkte-Board: zwei Reihen ebenfalls per rAF (gegenläufig) */
let boardRAF=null,boardLast=0;
const BOARD_SPEED=70; // px/s
function animateBoard(){
  cancelAnimationFrame(boardRAF);boardRAF=null;
  const rows=[...document.querySelectorAll(".btrack")];
  if(!rows.length)return;
  rows.forEach(r=>{r.style.animation="none";
    const w=r.scrollWidth/2;r._wrap=w;
    r._dir=r.classList.contains("rev")?1:-1;
    r._x=r._dir<0?0:-w;
    r.style.transform="translateX("+r._x+"px)";});
  boardLast=performance.now();
  const step=now=>{
    const cur=[...document.querySelectorAll(".btrack")];
    if(!cur.length){boardRAF=null;return;}
    const dt=Math.min(0.05,(now-boardLast)/1000);boardLast=now;
    cur.forEach(r=>{const w=r._wrap||r.scrollWidth/2;r._x=(r._x||0)+r._dir*BOARD_SPEED*dt;
      if(r._dir<0&&r._x<=-w)r._x+=w; else if(r._dir>0&&r._x>=0)r._x-=w;
      r.style.transform="translateX("+r._x.toFixed(2)+"px)";});
    boardRAF=requestAnimationFrame(step);
  };
  boardRAF=requestAnimationFrame(step);

const cssvar=v=>v.startsWith("var(")?getComputedStyle(document.documentElement).getPropertyValue(v.slice(4,-1)).trim():v;
function lineChartSVG(series,o){
  const W=1000,H=470,x0=92,y0=20,w=874,h=362,yt=o.yticks||4;let g="";
  for(let i=0;i<=yt;i++){const val=o.min+(o.max-o.min)*i/yt;const y=y0+h-(i/yt)*h;
    g+=`<line x1="${x0}" y1="${y}" x2="${x0+w}" y2="${y}" stroke="#eaebed" stroke-width="2"/>`;
    g+=`<text x="${x0-16}" y="${y+9}" font-size="28" fill="#192121" opacity=".55" text-anchor="end">${o.yfmt(val)}</text>`;}
  const xl=o.xlabels||[],idxs=xl.length<=6?xl.map((_,i)=>i):[0,Math.floor((xl.length-1)/2),xl.length-1];let xt="";
  idxs.forEach(i=>{if(xl[i]!=null){const x=x0+(i/(xl.length-1))*w;
    xt+=`<text x="${x}" y="${y0+h+42}" font-size="28" fill="#192121" opacity=".55" text-anchor="middle">${xl[i]}</text>`;}});
  let ln="";series.forEach(s=>{const n=s.values.length;
    const pts=s.values.map((v,i)=>[x0+(i/(n-1))*w,y0+h-((v-o.min)/(o.max-o.min))*h]);
    const d=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
    ln+=`<path d="${d}" fill="none" stroke="${cssvar(s.color)}" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>`;
    const P=pts[pts.length-1];ln+=`<circle cx="${P[0]}" cy="${P[1]}" r="10" fill="${cssvar(s.color)}"/>`;});
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${g}${xt}${ln}</svg>`;
}
function areaSVG(values,color){
  const W=1000,H=300,x0=4,y0=10,w=992,h=270;
  const mn=Math.min(...values)*0.985,mx=Math.max(...values)*1.01;
  const pts=values.map((v,i)=>[x0+(i/(values.length-1))*w,y0+h-((v-mn)/(mx-mn))*h]);
  const d=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area=d+` L${pts[pts.length-1][0].toFixed(1)} ${y0+h} L${pts[0][0].toFixed(1)} ${y0+h} Z`;
  const c=cssvar(color);
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${area}" fill="${c}" opacity=".12"/>
    <path d="${d}" fill="none" stroke="${c}" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function barsSVG(groups,o){
  const W=1000,H=470,x0=92,y0=20,w=874,h=362,yt=o.yticks||4;let g="";
  for(let i=0;i<=yt;i++){const val=o.max*i/yt;const y=y0+h-(i/yt)*h;
    g+=`<line x1="${x0}" y1="${y}" x2="${x0+w}" y2="${y}" stroke="#eaebed" stroke-width="2"/>`;
    g+=`<text x="${x0-16}" y="${y+9}" font-size="27" fill="#192121" opacity=".55" text-anchor="end">${val.toFixed(0)}%</text>`;}
  const gw=w/groups.length,bw=gw*0.27,gap=gw*0.09;let bars="";
  groups.forEach((grp,gi)=>{const gx=x0+gi*gw+gw/2;const xs=[gx-bw-gap/2,gx+gap/2];
    grp.bars.forEach((b,bi)=>{const bh=(b.val/o.max)*h;const x=xs[bi];const y=y0+h-bh;
      bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="6" fill="${cssvar(b.color)}"/>`;
      bars+=`<text x="${x+bw/2}" y="${y-12}" font-size="28" font-weight="700" fill="${grp.labelColor||'#192121'}" text-anchor="middle">${b.val.toFixed(1)}</text>`;});

  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${g}${bars}</svg>`;
}

/* ===== Korrelation: Engine + deterministische Illustrationsreihe + Loader ===== */
function pearson(a,b){const n=a.length;let sa=0,sb=0;for(let i=0;i<n;i++){sa+=a[i];sb+=b[i];}
  const ma=sa/n,mb=sb/n;let cov=0,va=0,vb=0;
  for(let i=0;i<n;i++){const da=a[i]-ma,db=b[i]-mb;cov+=da*db;va+=da*da;vb+=db*db;}
  return (va&&vb)?cov/Math.sqrt(va*vb):0;}
function rollingCorr(eq,dy,W){const out=[];for(let i=W-1;i<eq.length;i++){
  out.push(pearson(eq.slice(i-W+1,i+1),dy.slice(i-W+1,i+1)));}return out;}
function decYear(t){const m=/^(\d{4})-(\d{2})/.exec(t);return m?(+m[1]+(+m[2]-1)/12):+t;}
function genCorrSeries(){
  // Stützpunkte (Jahr, Ziel-Korrelation) – reproduzieren den Regimeverlauf
  const cp=[[1996,0.10],[1999,0.10],[2002,0.12],[2004,0.35],[2006,0.40],[2007.4,0.38],
    [2008,0.05],[2008.7,0.30],[2009.6,0.45],[2011,0.45],[2013,0.60],[2014,0.55],
    [2016,0.46],[2019,0.38],[2020.0,0.40],[2020.4,0.50],[2021.5,0.50],[2022.4,0.52],
    [2022.9,0.45],[2023.4,0.18],[2023.9,-0.05],[2024.4,-0.15],[2025.0,-0.10],[2026.0,-0.06],[2026.5,-0.07]];
  const rho=y=>{if(y<=cp[0][0])return cp[0][1];if(y>=cp[cp.length-1][0])return cp[cp.length-1][1];
    for(let i=1;i<cp.length;i++){if(y<=cp[i][0]){const[a,va]=cp[i-1],[b,vb]=cp[i];return va+(vb-va)*(y-a)/(b-a);}}return cp[cp.length-1][1];};
  // seeded RNG (mulberry32) → über Reloads stabil
  let s=20260630>>>0;const rnd=()=>{s=(s+0x6D2B79F5)>>>0;let t=Math.imul(s^(s>>>15),1|s);
    t=(t+Math.imul(t^(t>>>7),61|t))^t;return ((t^(t>>>14))>>>0)/4294967296;};
  const gauss=()=>{let u=0,v=0;while(!u)u=rnd();while(!v)v=rnd();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);};
  const start=1996.0,W=36;const n=Math.round((2026.5-start)*12)+1;
  const eq=[],dy=[],yr=[];
  for(let i=0;i<n;i++){const y=start+i/12;let r=rho(y);r=Math.max(-0.95,Math.min(0.95,r));
    const z1=gauss(),z3=gauss();eq.push(z1);dy.push(r*z1+Math.sqrt(1-r*r)*z3);yr.push(y);}
  const corr=rollingCorr(eq,dy,W);const pts=[];
  for(let i=0;i<corr.length;i++){const Y=yr[i+W-1];
    const v=0.6*Math.max(-0.5,Math.min(0.8,rho(Y)))+0.4*corr[i];
    pts.push({year:Y,v:+v.toFixed(4)});}
  return pts;
}
function corrPoints(){const s=store.korrelation;
  if(s.points&&s.points.length)return s.points;
  if(!s.gen)s.gen=genCorrSeries();return s.gen;}
const CORR_SOURCE="./data/correlation.json";
async function refreshCorr(){const s=store.korrelation;
  try{const c=new AbortController();const tm=setTimeout(()=>c.abort(),6000);
    const r=await fetch(CORR_SOURCE,{signal:c.signal,cache:"no-store"});clearTimeout(tm);if(!r.ok)throw 0;
    const j=await r.json();let pts=null;
    if(Array.isArray(j.points)&&j.points.length){pts=j.points.map(p=>({year:decYear(p.t),v:+p.v}));}
    else if(Array.isArray(j.spx)&&Array.isArray(j.y10)&&j.spx.length===j.y10.length){
      const W=(j.window||36),eq=[],dy=[];
      for(let i=1;i<j.spx.length;i++){eq.push(j.spx[i]/j.spx[i-1]-1);dy.push(j.y10[i]-j.y10[i-1]);}
      const corr=rollingCorr(eq,dy,W);const dates=(j.dates||[]).slice(W); // erstes Return entfällt
      pts=corr.map((v,i)=>({year:dates[i]?decYear(dates[i]):(2000+i/12),v}));}
    if(pts&&pts.length){s.points=pts;s.ts=now();s.stale=false;
      s.asof=(j.meta&&j.meta.asof)||"";s.src=(j.meta&&j.meta.source)||"data/correlation.json";}
  }catch(e){/* Illustrationsreihe bleibt */}
}
const CORR_ERAS=[
  {de:"Vor GFC (1999–2007)",en:"Pre-GFC (1999–2007)",from:-1e9,to:2007,color:"#3f5a66"},

function eraColor(y){for(const e of CORR_ERAS)if(y>=e.from&&y<e.to)return e.color;return CORR_ERAS[CORR_ERAS.length-1].color;}
function corrChartSVG(points,o){
  const W=1000,H=470,x0=92,y0=14,w=874,h=372;const n=points.length;
  const Y=v=>y0+h-((v-o.min)/(o.max-o.min))*h;const X=i=>x0+(i/(n-1))*w;
  const xFromYear=yr=>{if(yr<=points[0].year)return x0;if(yr>=points[n-1].year)return x0+w;
    const i=points.findIndex(p=>p.year>=yr);if(i<=0)return x0;
    const a=points[i-1].year,b=points[i].year,f=(yr-a)/((b-a)||1);return X(i-1)+(X(i)-X(i-1))*f;};
  // Ereignis-Bänder (Hintergrund)
  let bands="";CORR_BANDS.forEach(bd=>{const xa=xFromYear(bd.from),xb=xFromYear(bd.to);
    bands+=`<rect x="${xa.toFixed(1)}" y="${y0}" width="${(xb-xa).toFixed(1)}" height="${h}" fill="${bd.color}" opacity=".22"/>`;});
  // Gitter + y-Achse (0-Linie gestrichelt)
  let g="";o.ticks.forEach(tv=>{const y=Y(tv),zero=tv===0;
    g+=`<line x1="${x0}" y1="${y.toFixed(1)}" x2="${x0+w}" y2="${y.toFixed(1)}" stroke="${zero?'#192121':'#eaebed'}" stroke-width="${zero?2.5:2}" ${zero?'stroke-dasharray="6 6"':''}/>`;
    g+=`<text x="${x0-16}" y="${(y+9).toFixed(1)}" font-size="27" fill="#192121" opacity="${zero?.75:.5}" text-anchor="end">${tv.toFixed(1)}</text>`;});
  let xt="";o.yearTicks.forEach(yr=>{const x=xFromYear(yr);
    xt+=`<text x="${x.toFixed(1)}" y="${y0+h+42}" font-size="27" fill="#192121" opacity=".5" text-anchor="middle">${yr}</text>`;});
  // COVID-Strukturbruch 2020 (rot gepunktet)
  const cx=xFromYear(2020);
  const cov=`<line x1="${cx.toFixed(1)}" y1="${y0}" x2="${cx.toFixed(1)}" y2="${y0+h}" stroke="#9e1b32" stroke-width="3" stroke-dasharray="2 7" stroke-linecap="round" opacity=".8"/>`;
  // Ära-eingefärbte Linie (Segmente)
  const segs=[];let start=0;
  for(let i=1;i<=n;i++){const eCur=eraColor(points[i-1].year);const eNext=i<n?eraColor(points[i].year):null;
    if(i===n||eNext!==eCur){segs.push({c:eCur,a:start,b:i-1});start=i;}}
  let lines="";segs.forEach((s,si)=>{const end=si<segs.length-1?s.b+1:s.b;let d="";
    for(let i=s.a;i<=end;i++){d+=(i===s.a?"M":"L")+X(i).toFixed(1)+" "+Y(points[i].v).toFixed(1)+" ";}
    lines+=`<path d="${d.trim()}" fill="none" stroke="${s.c}" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>`;});
  const last=points[n-1],lx=X(n-1),ly=Y(last.v),lc=eraColor(last.year);
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    ${bands}${g}${xt}${cov}${lines}
    <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="10" fill="${lc}"/></svg>`;
}
function renderKorrelation(mod){
  const pts=corrPoints();const cur=pts[pts.length-1].v;
  const reg=cur>0.12?t("ko_reg_pos"):(cur<-0.05?t("ko_reg_neg"):t("ko_reg_zero"));
  const lc=eraColor(pts[pts.length-1].year);
  const chart=corrChartSVG(pts,{min:-0.5,max:0.85,ticks:[-0.4,-0.2,0,0.2,0.4,0.6,0.8],yearTicks:[2000,2004,2008,2012,2016,2020,2024]});
  const leg=CORR_ERAS.map(e=>`<span class="leg"><i style="background:${e.color}"></i>${esc(L(e))}</span>`).join("");
  const body=`<div class="eyebrow">${t("ko_eye")}</div>
    <div class="split">
      <div class="fhead">
        <div class="label" style="font-size:2.5cqh;opacity:.7">${t("ko_lead")}</div>
        <div class="big" style="color:${lc}">${cur>=0?"+":""}${cur.toFixed(2)}</div>
        <div class="at" style="color:${lc}">${reg}</div>
        <div class="cap2">${t("ko_cap")}</div>
      </div>
      <div class="chart-wrap" style="margin-top:0">
        <div class="legend" style="font-size:2.3cqh">${leg}</div>
        <div class="chart">${chart}</div>
      </div>
    </div>
    <div class="note">${t("ko_note")}</div>`;
  return shell(mod,body);
}


function renderForecast(mod){
  const d=store.forecast.data;
  const groups=d.regions.map(r=>({label:L(r.r),labelColor:r.hl?"#823896":null,bars:[
    {val:r.a,color:r.hl?"var(--aubergine)":"var(--cobalt)"},
    {val:r.b,color:r.hl?"#b06ac2":"var(--moos)"}]}));
  return shell(mod,`<div class="eyebrow">${t("f_eye")}</div>
    <div class="split">
      <div class="fhead">
        <div class="label" style="font-size:2.5cqh;opacity:.7">${t("f_global")}</div>
        <div class="big">+${d.global26.toFixed(1)}<b>%</b></div>
        <div class="cap">${t("f_then")(d.global27.toFixed(1))}</div>
        <div class="at">${t("f_at")(d.at26.toFixed(1),d.at27.toFixed(1))}</div>
        <div class="cap2">${t("f_src")}</div>
      </div>
      <div class="chart-wrap" style="margin-top:0">
        <div class="legend">
          <span class="leg"><i style="background:var(--cobalt)"></i>${t("f_l26")}</span>
          <span class="leg"><i style="background:var(--moos)"></i>${t("f_l27")}</span>
          <span class="leg"><i style="background:var(--aubergine)"></i>${t("f_lat")}</span></div>
        <div class="chart">${barsSVG(groups,{max:7,yticks:7})}</div>
      </div>
    </div>`);
}

function renderKalender(mod){
  const ev=store.kalender.data.map(e=>`<div class="cev">
    <span class="cdate">${esc(L(e.date))}</span><span class="ctag">${esc(e.tag)}</span>
    <span class="ctxt">${esc(L(e.txt))}</span></div>`).join("");
  return shell(mod,`<div class="eyebrow">${t("cal_eye")}</div><div class="cal">${ev}</div>`);
}

/* ===================================================================
   ROUTING + ROTATION + SPRACHE
=================================================================== */
const screensEl=document.getElementById("screens");
const progressEl=document.getElementById("progress");
const hintEl=document.getElementById("hint");
let current=0,timer=null,raf=null,startT=0,newsIdx=0,newsCycleTimer=null;
let paused=new URLSearchParams(location.search).get("autoplay")==="off";

function idxFromHash(){const id=location.hash.replace(/^#\/?/,"")||"uebersicht";
  const i=modules.findIndex(m=>m.id===id);return i>=0?i:0;}
function renderCurrent(){const mod=modules[current];
  screensEl.innerHTML=`<div class="screen active">${mod.render(mod)}</div>`;
  paintClock();paintDots();startProgress();startNewsCycle(mod);updateTicker();animateBoard();}
function startNewsCycle(mod){clearInterval(newsCycleTimer);newsCycleTimer=null;
  if(mod.id!=="news")return;
  newsCycleTimer=setInterval(()=>{const el=document.getElementById("news-stage");
    if(!el){clearInterval(newsCycleTimer);return;}
    newsIdx++;el.innerHTML=newsEntryHTML(newsIdx);},6000);}
function paintDots(){const dots=document.getElementById("dots");if(!dots)return;
  dots.innerHTML=modules.map((m,i)=>`<button class="dot ${i===current?"on":""}" title="${esc(modTitle(m.id))}" onclick="scopeGo(${i})"></button>`).join("");}
function startProgress(){cancelAnimationFrame(raf);clearTimeout(timer);progressEl.style.width="0%";if(paused)return;
  const dur=modules[current].dur;startT=performance.now();
  const step=tt=>{const p=Math.min(1,(tt-startT)/dur);progressEl.style.width=(p*100)+"%";if(p<1)raf=requestAnimationFrame(step);};
  raf=requestAnimationFrame(step);timer=setTimeout(autoNext,dur);}
function go(i){current=(i+modules.length)%modules.length;location.hash="#/"+modules[current].id;}
window.scopeGo=go;
function autoNext(){ // automatischer Schritt: am Zyklus-Ende ggf. Sprache wechseln
  const nextI=(current+1)%modules.length;
  if(nextI===0 && !langPinned){LANG=LANG==="de"?"en":"de";buildTicker();}
  go(nextI);
}
function next(){go(current+1);} function prev(){go(current-1);}
function setLang(l){LANG=l;buildTicker();renderCurrent();}
window.scopeLang=function(){langPinned=true;setLang(LANG==="de"?"en":"de");
  showHint(LANG==="de"?"Deutsch · fixiert":"English · pinned");};
function showHint(x){hintEl.textContent=x;hintEl.classList.add("show");clearTimeout(showHint._t);showHint._t=setTimeout(()=>hintEl.classList.remove("show"),1600);}
window.addEventListener("hashchange",()=>{current=idxFromHash();renderCurrent();});
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight")next();else if(e.key==="ArrowLeft")prev();
  else if(e.key.toLowerCase()==="l"){langPinned=true;setLang(LANG==="de"?"en":"de");showHint(LANG.toUpperCase());}
  else if(e.key===" "){e.preventDefault();paused=!paused;showHint(paused?(LANG==="en"?"Paused":"Pausiert"):(LANG==="en"?"Resumed":"Fortsetzung"));startProgress();}});
function paintClock(){const a=document.getElementById("clk-t"),b=document.getElementById("clk-d");if(!a||!b)return;const n=new Date();
  a.textContent=n.toLocaleTimeString(loc(),{hour:"2-digit",minute:"2-digit"});
  b.textContent=n.toLocaleDateString(loc(),{weekday:"long",day:"2-digit",month:"long",year:"numeric"});}
setInterval(paintClock,20000);
setInterval(()=>{if(document.hidden)return;const mod=modules[current];const el=document.getElementById("stat");
  const s=mod.id==="news"?newsStore():store[mod.id];
  if(el&&s){const lbl=mod.id==="news"?t("fallback"):t("lastKnown");
    el.innerHTML=s.stale?`${t("source")} ${esc(s.src)} · <span class="stale">${lbl}</span>`:`${t("source")} ${esc(s.src)} · ${t("updated")} ${ago(s.ts)}`;}},10000);

if(!location.hash)location.hash="#/uebersicht";
current=idxFromHash();renderCurrent();
</script>
