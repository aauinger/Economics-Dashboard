name: Update dashboard data

# Erzeugt die data/*.json neu und committet sie zurueck ins Repo.
# GitHub Pages deployt danach automatisch die aktualisierte Version.
#   risk.json         FRED EPU/WUI/TPU + Caldara-Iacoviello GPR
#   global.json       IMF WEO (live) + OECD/WB/UN (gepflegte Konstanten)
#   correlation.json  S&P 500 (Yahoo) + US-10J (FRED) -> Engine im Dashboard

on:
  schedule:
    # Jeden Montag 06:00 UTC. Die Indizes sind monatlich/quartalsweise;
    # bei unveraenderten Daten wird NICHTS committet (siehe Schritt unten).
    - cron: "0 6 * * 1"
  workflow_dispatch: {}   # erlaubt manuelles Ausloesen im Actions-Tab

permissions:
  contents: write          # noetig, damit der Job zurueck pushen darf

# Verhindert parallele Laeufe, die sich beim Push in die Quere kommen
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update-risk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas requests openpyxl xlrd

      # Jeder Generator schreibt atomar; faellt eine Quelle aus, bleibt die
      # jeweils alte Datei erhalten. '|| true' verhindert, dass der Ausfall
      # EINER Quelle die Aktualisierung der anderen blockiert.
      - name: Regenerate data/risk.json
        run: python update_risk.py || true

      - name: Regenerate data/global.json
        run: python update_global.py || true

      - name: Regenerate data/correlation.json
        run: python update_correlation.py || true

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/risk.json data/global.json data/correlation.json
          if git diff --staged --quiet; then
            echo "Keine neuen Daten - kein Commit."
          else
            git commit -m "chore(data): refresh dashboard data (automated)"
            git push
            echo "Daten aktualisiert und gepusht."
          fi
